name: Deploy Presburger mdBook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: work/presburger-tutorial/mdbook/package-lock.json

      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.4.52

      - name: Install JavaScript dependencies
        run: npm ci --prefix work/presburger-tutorial/mdbook

      - name: Test and build the book
        run: npm run ci --prefix work/presburger-tutorial/mdbook

      - name: Deploy production site
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy outputs/presburger-algebra-polyhedral-analysis-mdbook/book
            --project-name=presburger --branch=main

      - name: Deploy pull request preview
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy outputs/presburger-algebra-polyhedral-analysis-mdbook/book
            --project-name=presburger --branch=pr-${{ github.event.pull_request.number }}
